<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PIHCS Docent Attendance</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @font-face {
      font-family: 'SystemMono';
      src: url('MDSystemMonoTrial-Medium.otf') format('opentype');
    }
    @font-face {
      font-family: 'Buzz';
      src: url('TRIAL_OTT_Buzz.otf') format('opentype');
    }
    body { background-color: #0957C3; color: white; font-family: 'SystemMono', sans-serif; }
    h1 { font-family: 'Buzz', sans-serif; }
  </style>
</head>
<body class="p-4">
  <div class="max-w-md mx-auto">
    <header class="text-center mb-6">
      <h1 class="text-3xl font-bold">PROTOTYPE ISLAND HOMECOMING</h1>
      <p class="text-blue-200">DOCENT'S ATTENDANCE</p>
    </header>

    <div class="space-y-4">
      <input type="text" id="docent-name" placeholder="Full Name" class="w-full p-3 rounded-lg bg-blue-900 border border-blue-600 text-white placeholder-blue-300">
      
      <label class="block w-full p-4 text-center border-2 border-dashed border-blue-400 rounded-lg cursor-pointer hover:bg-blue-800 transition">
        📷 <span id="photo-label">Take a picture of yourself</span>
        <input type="file" id="camera-input" accept="image/*" capture="environment" class="hidden">
      </label>

      <div class="flex gap-4">
        <button id="btn-in" class="flex-1 p-4 bg-white text-blue-900 font-bold rounded-lg shadow-lg hover:bg-gray-100 transition">Check in</button>
        <button id="btn-out" class="flex-1 p-4 bg-transparent border border-blue-400 text-blue-100 rounded-lg hover:bg-blue-800 transition">Check out</button>
      </div>

      <div class="bg-blue-900 rounded-lg overflow-hidden border border-blue-600">
        <table class="w-full text-sm text-left">
          <thead class="bg-blue-800 text-blue-300"><tr><th class="p-3">Photo</th><th class="p-3">Name</th><th class="p-3">Status</th></tr></thead>
          <tbody id="entries-body"></tbody>
        </table>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
    import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-storage.js";

    const firebaseConfig = {
      apiKey: "AIzaSyA3nYu-FUpbA0Hm1uzt0fYKtXn3WR72atI",
      authDomain: "pi-hcs-docent-attendance.firebaseapp.com",
      projectId: "pi-hcs-docent-attendance",
      storageBucket: "pi-hcs-docent-attendance.firebasestorage.app",
      messagingSenderId: "134285081550",
      appId: "1:134285081550:web:eefb0be937316ca393899f"
    };

    try {
      const app = initializeApp(firebaseConfig);
      const db = getFirestore(app);
      const storage = getStorage(app);
      const auth = getAuth(app);

      signInAnonymously(auth).catch(err => alert("Auth Failed: " + err.message));

      let selectedFile = null;
      document.getElementById('camera-input').onchange = (e) => {
        selectedFile = e.target.files[0];
        document.getElementById('photo-label').textContent = "Photo selected! ✅";
      };

      async function checkIn(status) {
        const name = document.getElementById('docent-name').value;
        if (!name || !selectedFile) { alert("Please enter name and take a photo!"); return; }

        try {
          const storageRef = ref(storage, 'photos/' + Date.now());
          await uploadBytes(storageRef, selectedFile);
          const url = await getDownloadURL(storageRef);

          await addDoc(collection(db, "attendance"), {
            name, photo: url, status, timestamp: serverTimestamp()
          });
          alert("Success!");
          document.getElementById('docent-name').value = "";
          document.getElementById('photo-label').textContent = "Take a picture of yourself";
        } catch (err) { alert("Error: " + err.message); }
      }

      document.getElementById('btn-in').onclick = () => checkIn("In");
      document.getElementById('btn-out').onclick = () => checkIn("Out");

      onSnapshot(query(collection(db, "attendance"), orderBy("timestamp", "desc")), (snap) => {
        const tbody = document.getElementById('entries-body');
        tbody.innerHTML = "";
        snap.forEach(doc => {
          const data = doc.data();
          tbody.innerHTML += `
            <tr class="border-b border-blue-800">
              <td class="p-3"><img src="${data.photo}" class="w-10 h-10 rounded object-cover"></td>
              <td class="p-3">${data.name}</td>
              <td class="p-3">${data.status}</td>
            </tr>`;
        });
      });
    } catch (err) {
      alert("System Error: " + err.message);
    }
  </script>
</body>
</html>
