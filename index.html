<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Prototype Island Homecoming showcase Docent's Attendance</title>
  
  <style>
    @font-face {
      font-family: 'CustomTitleFont';
      src: url('TRIAL_OTT_Buzz.otf') format('opentype'); 
      font-weight: normal;
      font-style: normal;
    }

    @font-face {
      font-family: 'CustomBodyFont';
      src: url('MDSystemMonoTrial-Medium.otf') format('opentype'); 
      font-weight: normal;
      font-style: normal;
    }

    :root {
      --bg-color: #0957C3;
      --surface-color: #074BA8; 
      --text-main: #ffffff;
      --text-muted: #b0ccef; 
      --border-color: #176BDE; 
      --pantone-main: #0957C3;
      --accent-grey: #f8fafc;
      --accent-grey-muted: #cbd5e1;
      --accent-in: var(--accent-grey); 
      --accent-out: transparent;
      --accent-out-border: var(--accent-grey-muted);
      --accent-out-text: var(--accent-grey-muted);
      --btn-text: var(--pantone-main);
      --danger: #ff8b94;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'CustomBodyFont', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background-color: var(--bg-color);
      color: var(--text-main);
      padding: 16px;
      line-height: 1.5;
    }

    .container { max-width: 600px; margin: 0 auto; padding-bottom: 40px; }

    header { text-align: center; margin-bottom: 24px; }
    header h1 {
      font-family: 'CustomTitleFont', sans-serif;
      font-size: 1.8rem;
      font-weight: normal;
      line-height: 1.2;
    }
    .header-subtitle {
      display: block;
      font-size: 1.15rem;
      font-weight: 500;
      color: var(--text-muted);
      margin-top: 8px;
      font-family: 'CustomBodyFont', sans-serif; 
    }

    .form-group { margin-bottom: 16px; }
    input[type="text"], input[type="password"] {
      width: 100%;
      padding: 14px;
      border-radius: 8px;
      border: 1px solid var(--border-color);
      background: var(--surface-color);
      color: #ffffff;
      font-size: 1rem;
      font-weight: bold;
    }

    .camera-btn {
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100%;
      padding: 16px;
      background-color: rgba(255, 255, 255, 0.05); 
      border: 1px dashed var(--accent-grey-muted);
      border-radius: 8px;
      color: var(--accent-grey);
      font-size: 1.1rem;
      cursor: pointer;
    }
    
    .action-row { display: flex; gap: 12px; margin-bottom: 32px; }
    button {
      border: none;
      border-radius: 8px;
      padding: 16px;
      font-size: 1.1rem;
      font-family: 'CustomBodyFont', sans-serif;
      cursor: pointer;
    }

    .btn-in { background-color: var(--accent-in); color: var(--btn-text); flex: 1; }
    .btn-out { background-color: var(--accent-out); color: var(--accent-out-text); border: 2px solid var(--accent-out-border); flex: 1; }
    
    .table-wrapper { background: var(--surface-color); border-radius: 8px; overflow-x: auto; border: 1px solid var(--border-color); }
    table { width: 100%; border-collapse: collapse; text-align: left; font-size: 0.9rem; }
    th, td { padding: 12px; border-bottom: 1px solid var(--border-color); }
    .td-photo img { width: 48px; height: 48px; object-fit: cover; border-radius: 4px; }
    .btn-delete { background: transparent; padding: 8px; color: var(--text-muted); border: none; }

    .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; justify-content: center; align-items: center; z-index: 1000; padding: 16px; }
    .modal-overlay.active { display: flex; }
    .modal-box { background: var(--surface-color); padding: 24px; border-radius: 12px; width: 100%; max-width: 340px; text-align: center; border: 1px solid var(--border-color); }
    .modal-msg { margin-bottom: 20px; font-size: 1.05rem; }
    .modal-btn { padding: 10px 20px; border-radius: 6px; font-family: 'CustomBodyFont', sans-serif; }
  </style>
</head>
<body>

  <!-- Custom Alert Modal -->
  <div id="alert-modal" class="modal-overlay">
    <div class="modal-box">
      <div id="alert-msg" class="modal-msg"></div>
      <button class="modal-btn" onclick="closeAlert()" style="background: white; color: var(--bg-color);">OK</button>
    </div>
  </div>

  <div class="container">
    <header>
      <h1>Prototype Island Homecoming Showcase</h1>
      <span class="header-subtitle">Docent's Attendance</span>
    </header>

    <div class="form-group">
      <input type="text" id="docent-name" placeholder="Full Name">
    </div>

    <div class="form-group">
      <label class="camera-btn">
        📷 Take a picture of yourself
        <input type="file" id="camera-input" accept="image/*" capture="environment" style="display:none;">
      </label>
    </div>

    <div class="action-row">
      <button type="button" class="btn-in" id="btn-in">Check in</button>
      <button type="button" class="btn-out" id="btn-out">Check out</button>
    </div>

    <div class="table-wrapper">
      <table id="entries-table">
        <thead><tr><th>Photo</th><th>Name</th><th>Status</th></tr></thead>
        <tbody id="entries-body"></tbody>
      </table>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, collection, addDoc, serverTimestamp, onSnapshot, query, orderBy, limit } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    const fallbackConfig = {
      apiKey: "AIzaSyA3nYu-FUpbA0Hm1uzt0fYKtXn3WR72aTI",
      authDomain: "pi-hcs-docent-attendance.firebaseapp.com",
      projectId: "pi-hcs-docent-attendance",
      storageBucket: "pi-hcs-docent-attendance.firebasestorage.app",
      messagingSenderId: "134285081550",
      appId: "1:134285081550:web:eefb0be937316ca393899f",
      measurementId: "G-KXYJG21NBT"
    };

    const app = initializeApp(fallbackConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    window.showAlert = (msg) => {
      document.getElementById('alert-msg').textContent = msg;
      document.getElementById('alert-modal').classList.add('active');
    };
    window.closeAlert = () => document.getElementById('alert-modal').classList.remove('active');

    async function initializeAuth() {
      try {
        await signInAnonymously(auth);
        console.log("Auth success");
      } catch (err) {
        // DETAILED ERROR LOGGING
        window.showAlert("Auth Failed: " + err.code + " | " + err.message);
        console.error("Firebase Auth Error:", err);
      }
    }

    initializeAuth();

    // ... (rest of logic unchanged for brevity)
    document.getElementById('btn-in').addEventListener('click', () => window.showAlert("Test Check In clicked"));
  </script>
</body>
</html>
