<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Docent Attendance — Shared (Firestore)</title>
  <style>
    @font-face { font-family: 'SystemMono'; src: url('MDSystemMonoTrial-Medium.otf') format('opentype'); }
    @font-face { font-family: 'Buzz'; src: url('TRIAL_OTT_Buzz.otf') format('opentype'); }
    :root { --bg:#0957C3; --card:#0b1e38; --muted:#93c5fd; --text:#ffffff; --accent:#3b82f6; }
    *{box-sizing:border-box}
    body{margin:0;font-family: 'SystemMono', sans-serif; background:var(--bg);color:var(--text);padding-bottom:16px}
    header{padding:20px 16px 6px; max-width:860px; margin:auto}
    h1{margin:0 0 6px; font-family: 'Buzz', sans-serif; font-size:clamp(20px,4.5vw,28px)}
    p.sub{margin:0; color:var(--muted); font-size:15px}
    main{max-width:860px; margin:10px auto 80px; padding:0 16px; display:grid; gap:12px}
    .card{background:var(--card); border:1px solid #1e40af; padding:14px; border-radius:16px; box-shadow:0 10px 20px rgba(0,0,0,.25)}
    label{display:block; font-weight:600; margin-bottom:8px}
    input[type="text"], input[type="file"]{width:100%; background:#0f172a; color:var(--text); border:1px solid #1e40af; border-radius:14px; padding:14px 16px; font-size:16px}
    .row{display:grid; gap:12px; grid-template-columns:1fr}
    .actions{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:10px}
    .btn-in{background:#ffffff; color:#0957C3; font-weight:700}
    .btn-out{background:transparent; border:1px solid #93c5fd; color:#ffffff; font-weight:700}
    button{border:none; padding:16px 18px; border-radius:16px; cursor:pointer; width:100%; font-size:16px}
    table{width:100%; border-collapse:collapse}
    th,td{padding:12px 10px; border-bottom:1px solid #1e40af; text-align:left; vertical-align:middle}
    .thumb{width:64px;height:64px;object-fit:cover;border-radius:12px;border:1px solid #1e40af}
    .trashBtn{background:#1e3a8a; border:none; color:#ffffff; padding:8px 10px; border-radius:10px; cursor:pointer}
    @media (min-width:720px){ .row{grid-template-columns:1fr 1fr} }
    .custom-upload-btn { display: block; width: 100%; background: #3b82f6; color: #fff; padding: 14px 16px; border-radius: 12px; cursor: pointer; text-align: center; font-weight:600; }
  </style>
  <script>
    const MAX_THUMB_EDGE = 320;
    const JPEG_QUALITY   = 0.68;
    const ADMIN_EMAIL = "sieweian23@gmail.com";
  </script>
</head>
<body>
  <header>
    <h1>PROTOTYPE ISLAND HOMECOMING SHOWCASE</h1>
    <p class="sub">DOCENT'S ATTENDANCE</p>
  </header>

  <main>
  <section class="card">
    <div class="row">
      <div>
        <label for="fullName">Full name</label>
        <input id="fullName" type="text" placeholder="e.g., Eian Siew" autocomplete="name" />
      </div>
      <div>
        <label>Photo</label>
        <input id="photo" type="file" accept="image/*" capture="environment" style="display:none;" />
        <label for="photo" class="custom-upload-btn">📷 Take a picture</label>
      </div>
    </div>
    <div class="actions">
      <button class="btn-in" id="checkInBtn">Check in</button>
      <button class="btn-out" id="checkOutBtn">Check out</button>
    </div>
  </section>

    <section class="card">
      <div style="overflow:auto">
        <table id="logTable">
          <thead><tr><th>#</th><th>Photo</th><th>Name</th><th>Time</th><th>Actions</th></tr></thead>
          <tbody></tbody>
        </table>
      </div>
    </section>
  </main>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getFirestore, collection, addDoc, serverTimestamp, query, orderBy, limit, onSnapshot, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
    import { getAuth, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

    // 🔑 REPLACE WITH YOUR CONFIG FROM FIREBASE CONSOLE
    const firebaseConfig = {
      apiKey: "AIzaSyA3nYu-FUpbA0Hm1uzt0fYKtXn3WR72atI",
      authDomain: "pi-hcs-docent-attendance.firebaseapp.com",
      projectId: "pi-hcs-docent-attendance",
      storageBucket: "pi-hcs-docent-attendance.firebasestorage.app",
      messagingSenderId: "134285081550",
      appId: "1:134285081550:web:eefb0be937316ca393899f"
    };

    const app  = initializeApp(firebaseConfig);
    const db   = getFirestore(app);
    const auth = getAuth(app);
    const entriesRef = collection(db, "entries");

    async function toThumb(file){
      return new Promise((resolve)=>{
        const img = new Image();
        const url = URL.createObjectURL(file);
        img.onload = ()=>{
          const r = Math.min(1, MAX_THUMB_EDGE/Math.max(img.width, img.height));
          const w = Math.round(img.width*r), h = Math.round(img.height*r);
          const c = document.createElement("canvas"); c.width=w; c.height=h;
          c.getContext("2d").drawImage(img,0,0,w,h);
          resolve(c.toDataURL("image/jpeg", JPEG_QUALITY));
          URL.revokeObjectURL(url);
        };
        img.src = url;
      });
    }

    async function handleSubmit(kind){
      const name = document.getElementById("fullName").value.trim();
      const file = document.getElementById("photo").files[0];
      if (!name) { alert("Please enter your name."); return; }
      if (!file) { alert("Please take a photo."); return; }
      const thumb = await toThumb(file);
      await addDoc(entriesRef, { name, thumb, type: kind, submitted_at: serverTimestamp() });
      document.getElementById("fullName").value = "";
      alert("Submitted successfully!");
    }

    const tbody = document.querySelector("#logTable tbody");
    onSnapshot(query(entriesRef, orderBy("submitted_at", "desc"), limit(50)), (snap)=>{
      tbody.innerHTML = "";
      snap.forEach((d, i)=>{
        const x = d.data();
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>${snap.size - i}</td>
          <td><img class="thumb" src="${x.thumb}"></td>
          <td>${x.name}</td>
          <td>${x.submitted_at?.toDate().toLocaleTimeString()}</td>
          <td><button class="trashBtn" data-id="${d.id}">🗑️</button></td>`;
        tbody.appendChild(tr);
      });
    });

    document.getElementById("checkInBtn").addEventListener("click", ()=>handleSubmit("in"));
    document.getElementById("checkOutBtn").addEventListener("click", ()=>handleSubmit("out"));

    tbody.addEventListener("click", async (ev)=>{
      if (!ev.target.matches(".trashBtn")) return;
      const pwd = prompt("Admin password:");
      if (!pwd) return;
      try {
        await signInWithEmailAndPassword(auth, ADMIN_EMAIL, pwd);
        await deleteDoc(doc(db, "entries", ev.target.dataset.id));
        await signOut(auth);
      } catch(e) { alert("Action failed: " + e.message); }
    });
  </script>
</body>
</html>
